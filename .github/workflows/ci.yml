name: CI

on:
  push:
    branches: [master, main, "codex/**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/cache@v5
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-next-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('app/**/*.{ts,tsx}', 'components/**/*.{ts,tsx}', 'lib/**/*.{ts,tsx}', 'features/**/*.{ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-next-cache-${{ hashFiles('pnpm-lock.yaml') }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run docs:check
      - run: pnpm run check
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run test:e2e
      - run: pnpm run audit:high
